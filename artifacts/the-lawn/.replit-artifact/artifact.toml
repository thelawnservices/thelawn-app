kind = "web"
previewPath = "/the-lawn/"
title = "The Lawn"
version = "1.0.0"
id = "artifacts/the-lawn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/the-lawn/" ]
localPort = 25940

[services.development]
run = "pnpm --filter @workspace/the-lawn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/the-lawn", "run", "build" ]
publicDir = "artifacts/the-lawn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25940"
BASE_PATH = "/the-lawn/"
