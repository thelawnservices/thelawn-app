kind = "web"
previewPath = "/"
title = "Arcane Blade"
version = "1.0.0"
id = "artifacts/arcane-blade"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25469

[services.development]
run = "pnpm --filter @workspace/arcane-blade run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arcane-blade", "run", "build" ]
publicDir = "artifacts/arcane-blade/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25469"
BASE_PATH = "/"
